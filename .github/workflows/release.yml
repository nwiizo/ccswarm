name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false
        generate_release_notes: true

  build-release:
    name: Build Release (${{ matrix.asset_name }})
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: ccswarm
            asset_name: ccswarm-linux-amd64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: ccswarm
            asset_name: ccswarm-linux-arm64
            use_cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: ccswarm
            asset_name: ccswarm-darwin-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: ccswarm
            asset_name: ccswarm-darwin-arm64

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Install cross (for cross-compilation)
      if: matrix.use_cross
      run: cargo install cross --git https://github.com/cross-rs/cross

    - name: Build with cargo
      if: ${{ !matrix.use_cross }}
      run: cargo build --release --target ${{ matrix.target }}

    - name: Build with cross
      if: matrix.use_cross
      run: cross build --release --target ${{ matrix.target }}

    - name: Package binary (Unix)
      run: |
        cd target/${{ matrix.target }}/release
        chmod +x ${{ matrix.artifact_name }}
        tar czf ../../../${{ matrix.asset_name }}.tar.gz ${{ matrix.artifact_name }}
        cd ../../..

    - name: Generate SHA256
      run: |
        if [[ "$OSTYPE" == "darwin"* ]]; then
          shasum -a 256 ${{ matrix.asset_name }}.tar.gz > ${{ matrix.asset_name }}.tar.gz.sha256
        else
          sha256sum ${{ matrix.asset_name }}.tar.gz > ${{ matrix.asset_name }}.tar.gz.sha256
        fi

    - name: Upload Release Assets
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        files: |
          ${{ matrix.asset_name }}.tar.gz
          ${{ matrix.asset_name }}.tar.gz.sha256

  publish-crate:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: create-release
    steps:
    - uses: actions/checkout@v4

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Configure git
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"

    - name: Update Cargo.lock if needed
      run: |
        cargo update --workspace --quiet
        if ! git diff --quiet Cargo.lock; then
          git add Cargo.lock
          git commit -m "chore: update Cargo.lock for release"
        fi

    - name: Publish ai-session crate
      env:
        CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      run: |
        cd crates/ai-session
        cargo publish --token ${CARGO_REGISTRY_TOKEN} --allow-dirty || echo "ai-session might already be published"

    - name: Wait for ai-session to be available
      run: sleep 30

    - name: Publish ccswarm crate
      env:
        CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      run: |
        cd crates/ccswarm
        cargo publish --token ${CARGO_REGISTRY_TOKEN} --allow-dirty
